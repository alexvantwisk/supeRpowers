name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Windows is tolerated on the first matrix runs (run-hook.cmd polyglot +
      # path handling); promote to required once a green Windows run is observed.
      - run: python tests/run_all.py
        continue-on-error: ${{ matrix.os == 'windows-latest' }}
      - run: python tests/smoke_session_start.py
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck hooks/session-start hooks/detect-mcp.sh hooks/post-tool-use-format

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tests/run_all.py --layer 3
